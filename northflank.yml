version: 1
project:
  name: BloodEclipse-AI
services:
  - name: bot-service
    type: combined
    description: "BloodEclipse-AI Discord Bot"
    source:
      type: build
      context: .
      dockerfile: Dockerfile
    build:
      nodeVersion: 18
    resources:
      plan: nf-compute-20
    environment:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      MODELSLAB_API_KEY: ${{ secrets.MODELSLAB_API_KEY }}
      GUILD_ID: ${{ secrets.GUILD_ID }}
    health_checks:
      - name: Alive check
        type: CMD
        initialDelaySeconds: 10
        periodSeconds: 60
        failureThreshold: 3
        command: ["node", "-e", "process.exit(0)"]
    restart_policy:
      maxAttempts: 5
      delaySeconds: 10000
